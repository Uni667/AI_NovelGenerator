# Render Blueprint — Infrastructure as Code
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ai-novel-backend
    runtime: docker
    repo: https://github.com/Uni667/AI_NovelGenerator
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: API_SECRET_ENCRYPTION_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000
      - key: PYTHONUTF8
        value: "1"
    # Persistent disk — $0.25/GB/month (≈$3/year)
    # Required: must be on a paid Render plan (Starter $7/mo or Individual $0/mo)
    disk:
      name: ai-novel-data
      mountPath: /app/data
      sizeGB: 1
